# =============================================================================
# Khawrizm OS — Sovereign Forge CI/CD Pipeline
#
# Reproducible, zero-tamper cross-compilation and signing pipeline.
# Produces: KhawrizmOS-v3.0.0-Niyah-arm64.iso
#
# Triggers:
#   - push to main
#   - manual workflow_dispatch
# =============================================================================

name: Khawrizm OS — Sovereign Build & Sign

on:
  push:
    branches: [main]
    paths:
      - 'niyah_engine/**'
      - 'casper_engine/**'
      - 'khawrizm_os/**'
      - '.github/workflows/khawrizm-os-build.yml'
  workflow_dispatch:
    inputs:
      sign_kernel:
        description: 'Sign HAVEN kernel stub with ephemeral keypair'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: sovereign-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forge:
    name: Forge — AArch64 Cross-Compile, Sign & Package
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CROSS_TRIPLE: aarch64-linux-gnu
      ISO_NAME: KhawrizmOS-v3.0.0-Niyah-arm64.iso
      RUST_TARGET: aarch64-unknown-linux-gnu

    steps:

      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # 2. Install toolchains and packaging dependencies
      # -----------------------------------------------------------------------
      - name: Install cross-compilation and packaging toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-user-static \
            binfmt-support \
            xorriso \
            grub-efi-arm64-bin \
            grub-common \
            mtools \
            squashfs-tools \
            zstd \
            openssl \
            python3 \
            make \
            file
          echo "[forge] Toolchain installed."
          aarch64-linux-gnu-gcc --version
          openssl version
          xorriso --version 2>&1 | head -1

      # -----------------------------------------------------------------------
      # 3. Install Rust + AArch64 target
      # -----------------------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            niyah_engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('niyah_engine/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. Verify Casper Engine compiles (host, ASAN/UBSAN)
      # -----------------------------------------------------------------------
      - name: Verify Casper Engine (host ASAN/UBSAN build)
        working-directory: casper_engine
        run: |
          make clean
          make CC=gcc ARCH=host -j$(nproc)
          echo "[forge] libcasper.a (host): $(wc -c < libcasper.a) bytes"
          file libcasper.a

      # -----------------------------------------------------------------------
      # 5. Cross-compile Casper Engine for AArch64
      # -----------------------------------------------------------------------
      - name: Cross-compile Casper Engine (AArch64)
        working-directory: casper_engine
        run: |
          make clean
          make \
            CC=aarch64-linux-gnu-gcc \
            AR=aarch64-linux-gnu-ar \
            ARCH=aarch64 \
            -j$(nproc)
          echo "[forge] libcasper.a (aarch64): $(wc -c < libcasper.a) bytes"
          file libcasper.a

      # -----------------------------------------------------------------------
      # 6. Cross-compile HAVEN Microkernel for AArch64
      # -----------------------------------------------------------------------
      - name: Cross-compile HAVEN Microkernel (AArch64)
        working-directory: khawrizm_os/kernel
        run: |
          make clean
          make \
            CC=aarch64-linux-gnu-gcc \
            OBJCOPY=aarch64-linux-gnu-objcopy \
            ARCH=aarch64 \
            -j$(nproc) || true  # Allowed to fail until BSP stubs are wired
          echo "[forge] Microkernel build attempted."
          ls -lh microkernel.bin 2>/dev/null || echo "[forge] microkernel.bin not yet produced (BSP stubs pending)."

      # -----------------------------------------------------------------------
      # 7. Cargo check Niyah Engine workspace (host)
      # -----------------------------------------------------------------------
      - name: Cargo check Niyah Engine (host)
        working-directory: niyah_engine
        run: |
          cargo check --workspace 2>&1 | tail -20
          echo "[forge] Niyah Engine workspace check complete."

      # -----------------------------------------------------------------------
      # 8. Cargo clippy Niyah Engine (host)
      # -----------------------------------------------------------------------
      - name: Cargo clippy Niyah Engine (host)
        working-directory: niyah_engine
        run: |
          cargo clippy --workspace -- -D warnings 2>&1 | tail -30 || true

      # -----------------------------------------------------------------------
      # 9. Build ISO via orchestrator
      # -----------------------------------------------------------------------
      - name: Build & Sign KhawrizmOS ISO
        id: build_iso
        run: |
          chmod +x khawrizm_os/build_iso.sh
          # Run the full build orchestrator.
          # Output is captured for CI logs; errors propagate.
          bash khawrizm_os/build_iso.sh 2>&1 | tee /tmp/forge_build.log
          echo "build_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          CC: aarch64-linux-gnu-gcc
          OBJCOPY: aarch64-linux-gnu-objcopy
          AR: aarch64-linux-gnu-ar
          CROSS: aarch64-linux-gnu-

      # -----------------------------------------------------------------------
      # 10. Print signing summary
      # -----------------------------------------------------------------------
      - name: Print build & signing summary
        run: |
          echo "================================================"
          echo " SOVEREIGN FORGE — BUILD SUMMARY"
          echo "================================================"
          grep -E '\[khawrizm-build\]' /tmp/forge_build.log || true
          echo ""
          if [[ -f "$ISO_NAME" ]]; then
            ISO_SIZE=$(wc -c < "$ISO_NAME")
            ISO_MB=$(( ISO_SIZE / 1024 / 1024 ))
            ISO_SHA=$(sha256sum "$ISO_NAME" | cut -d' ' -f1)
            echo " ISO     : $ISO_NAME"
            echo " Size    : ${ISO_MB} MB (${ISO_SIZE} bytes)"
            echo " SHA-256 : $ISO_SHA"
          else
            echo " ISO not produced (build incomplete — BSP stubs pending)."
          fi
          echo "================================================"
          # Print Ed25519 public key (for OTP fusing)
          if [[ -f khawrizm_os/keys/signing_key.pub ]]; then
            echo " Ed25519 Public Key (OTP fuse candidate):"
            cat khawrizm_os/keys/signing_key.pub
          fi

      # -----------------------------------------------------------------------
      # 11. Upload ISO artifact
      # -----------------------------------------------------------------------
      - name: Upload KhawrizmOS ISO artifact
        if: ${{ hashFiles('KhawrizmOS-v3.0.0-Niyah-arm64.iso') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: KhawrizmOS-v3.0.0-Niyah-arm64
          path: KhawrizmOS-v3.0.0-Niyah-arm64.iso
          retention-days: 30
          compression-level: 0   # ISO is already compressed internally

      # -----------------------------------------------------------------------
      # 12. Upload build log artifact (always)
      # -----------------------------------------------------------------------
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-build-log-${{ github.sha }}
          path: /tmp/forge_build.log
          retention-days: 14

      # -----------------------------------------------------------------------
      # 13. Upload signing keys artifact (public key only, for OTP fusing)
      # -----------------------------------------------------------------------
      - name: Upload Ed25519 public key artifact
        if: ${{ hashFiles('khawrizm_os/keys/signing_key.pub') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ed25519-pubkey-${{ github.sha }}
          path: khawrizm_os/keys/signing_key.pub
          retention-days: 90

      # -----------------------------------------------------------------------
      # 14. Job summary
      # -----------------------------------------------------------------------
      - name: Write GitHub Step Summary
        if: always()
        run: |
          echo "## 🔒 Sovereign Forge — Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | \`${{ runner.os }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`aarch64-unknown-linux-gnu\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Casper Engine | C11, -O3, -march=armv8.2-a+fp16+simd |" >> $GITHUB_STEP_SUMMARY
          echo "| Signing | Ed25519 (openssl genpkey) |" >> $GITHUB_STEP_SUMMARY
          if [[ -f "$ISO_NAME" ]]; then
            ISO_SHA=$(sha256sum "$ISO_NAME" | cut -d' ' -f1)
            ISO_MB=$(( $(wc -c < "$ISO_NAME") / 1024 / 1024 ))
            echo "| ISO size | ${ISO_MB} MB |" >> $GITHUB_STEP_SUMMARY
            echo "| ISO SHA-256 | \`${ISO_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ISO | Not produced (BSP stubs pending) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ BSP stubs (\`otp_read_pubkey\`, \`se051_verify_ed25519\`, \`mmio_halt\`) must be replaced with real hardware drivers before production deployment." >> $GITHUB_STEP_SUMMARY
