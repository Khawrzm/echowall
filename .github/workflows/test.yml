name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[sim,dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy echowall/ || true

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke test (simulation)
        run: echowall run --simulate --scene apartment_2br
