name: Generate Synthetic CSI Dataset (HITL)

# Trigger: manual only from Actions UI (mobile-friendly).
# NEVER triggers automatically on push.
# The workflow CANNOT push to main directly.
# A human must review and merge the resulting PR.
on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'NumPy random seed (42 = canonical deterministic replay)'
        required: false
        default: '42'
      n_per_class:
        description: 'Samples per class (4 classes; total = 4x this value)'
        required: false
        default: '50'

jobs:
  generate-and-pr:
    name: Generate dataset and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install numpy
        run: pip install "numpy==1.26.4" --quiet

      - name: Generate deterministic synthetic CSI dataset
        run: |
          python scripts/generate_csi_dataset.py \
            --seed ${{ inputs.seed }} \
            --n-per-class ${{ inputs.n_per_class }}

      - name: Commit to data branch
        id: commit
        run: |
          SEED="${{ inputs.seed }}"
          BRANCH="data/synthetic-csi-seed-${SEED}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add tests/data/sample_csi_fall.csv tests/data/sample_csi_fall.meta.json
          git commit -m "chore(data): auto-generate full synthetic CSI dataset via CI (seed=${{ inputs.seed }})"
          git push origin "${BRANCH}"

      - name: Open Pull Request against main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"
          TOTAL=$(python -c "print(4 * int('${{ inputs.n_per_class }}'))")

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(data): full synthetic CSI dataset (seed=${{ inputs.seed }})" \
            --body "## Synthetic CSI Dataset — HITL Merge Required

          This PR was opened automatically by **generate-dataset.yml**.
          A human must review and merge it — the workflow has no write access to main.

          | Property | Value |
          |---|---|
          | Seed | ${{ inputs.seed }} |
          | Samples per class | ${{ inputs.n_per_class }} |
          | Total rows | ${TOTAL} |
          | Features | 640 (64 subcarriers x 10 frames) |
          | Quantization | INT8 |
          | Classes | 0=empty 1=standing 2=sitting 3=fall |

          SHA-256 recorded in tests/data/sample_csi_fall.meta.json.

          > WARNING: This is deterministic synthetic simulation data (seed=${{ inputs.seed }}).
          > It is NOT real RF measurements. Run echowall benchmark --real with
          > hardware-captured CSI for production accuracy metrics."
