name: Generate Synthetic CSI Dataset (HITL)

# Trigger: manual only. NEVER auto-runs. Cannot push to main directly.
on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'NumPy random seed (42 = canonical deterministic replay)'
        required: false
        default: '42'
      n_per_class:
        description: 'Samples per class (4 classes; total = 4x this)'
        required: false
        default: '50'

env:
  # Resolve defaults once at job level — avoids empty-string argparse crashes
  SEED: ${{ inputs.seed || '42' }}
  N_PER_CLASS: ${{ inputs.n_per_class || '50' }}

jobs:
  generate-and-pr:
    name: Generate dataset and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install numpy
        run: pip install "numpy==1.26.4" --quiet

      - name: Generate deterministic synthetic CSI dataset
        # Pass via env vars — no shell quoting issues
        run: python scripts/generate_csi_dataset.py --seed "$SEED" --n-per-class "$N_PER_CLASS"

      - name: Commit to unique data branch
        id: commit
        run: |
          # Append run_id to guarantee a fresh branch even if a prior run
          # partially pushed before failing (eliminates branch-already-exists error)
          BRANCH="data/synthetic-csi-seed-${SEED}-run-${{ github.run_id }}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # Stage only if files actually changed (avoids "nothing to commit" exit 1)
          git add tests/data/sample_csi_fall.csv tests/data/sample_csi_fall.meta.json

          if git diff --cached --quiet; then
            echo "No changes to commit (dataset unchanged). Exiting cleanly."
            echo "branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(data): auto-generate full synthetic CSI dataset via CI (seed=${SEED})"
          git push origin "${BRANCH}"

      - name: Open Pull Request against main
        if: steps.commit.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          TOTAL=$(python -c "print(4 * int('$N_PER_CLASS'))")

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(data): full synthetic CSI dataset (seed=${SEED})" \
            --body "$(printf '%s' "## Synthetic CSI Dataset - HITL Merge Required

This PR was opened automatically by generate-dataset.yml.
A human must review and merge it - the workflow cannot push to main directly.

| Property | Value |
|---|---|
| Seed | ${SEED} |
| Samples per class | ${N_PER_CLASS} |
| Total rows | ${TOTAL} |
| Features | 640 (64 subcarriers x 10 frames) |
| Quantization | INT8 |
| Classes | 0=empty 1=standing 2=sitting 3=fall |

SHA-256 recorded in tests/data/sample_csi_fall.meta.json.

WARNING: Deterministic synthetic simulation data (seed=${SEED}).
NOT real RF measurements. Run echowall benchmark --real for production metrics.")"
